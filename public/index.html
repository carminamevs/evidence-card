<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evidence of Things Unseen | Fit & Healthy Living</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Georgia','Times New Roman',serif;background:#f8f5fb;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem 4rem;color:#1a1a2e;}
.site-header{text-align:center;margin-bottom:1.75rem;max-width:520px;width:100%;}
.logo-line{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#A662A8;margin-bottom:8px;}
.main-title{font-size:28px;font-weight:normal;color:#073763;line-height:1.2;}
.main-sub{font-size:14px;color:#666;font-style:italic;margin-top:8px;line-height:1.6;}
.chat-window{background:#fff;border-radius:22px;border:1px solid #e4d9f0;max-width:520px;width:100%;overflow:hidden;box-shadow:0 2px 16px rgba(7,55,99,0.09);}
.chat-header{background:#073763;padding:14px 20px;display:flex;align-items:center;gap:12px;}
.chat-avatar{width:38px;height:38px;border-radius:50%;background:#A662A8;display:flex;align-items:center;justify-content:center;font-size:17px;color:white;flex-shrink:0;font-weight:500;}
.chat-header-name{font-size:15px;font-weight:500;color:white;}
.chat-header-status{font-size:12px;color:rgba(255,255,255,0.65);font-style:italic;}
.messages-area{padding:20px 16px;min-height:280px;max-height:420px;overflow-y:auto;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth;}
.bubble{max-width:84%;padding:11px 15px;font-size:15px;line-height:1.7;font-family:'Georgia',serif;white-space:pre-wrap;}
.bubble.coach{background:#efe8f6;color:#073763;border-radius:18px 18px 18px 4px;align-self:flex-start;}
.bubble.user{background:#073763;color:white;border-radius:18px 18px 4px 18px;align-self:flex-end;}
.typing{display:flex;gap:5px;padding:13px 15px;background:#efe8f6;border-radius:18px 18px 18px 4px;width:fit-content;align-self:flex-start;}
.dot{width:7px;height:7px;border-radius:50%;background:#A662A8;animation:pulse 1.3s ease-in-out infinite;}
.dot:nth-child(2){animation-delay:.22s;}.dot:nth-child(3){animation-delay:.44s;}
@keyframes pulse{0%,60%,100%{transform:translateY(0);opacity:.6;}30%{transform:translateY(-6px);opacity:1;}}
.progress{display:flex;justify-content:center;gap:7px;padding:10px;border-top:1px solid #f0eaf8;}
.pdot{width:7px;height:7px;border-radius:50%;background:#e0d4ee;transition:background .35s;}
